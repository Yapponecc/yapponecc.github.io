<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc 💗</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            background: linear-gradient(-45deg, #ff9fc3, #a0d4ff, #ffc4d6, #c2e5ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,159,195,0.5); }
        .tagline { opacity: .8; margin-bottom: 25px; font-size: 0.9rem; }

        .avatar-blob {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff9fc3, #a0d4ff);
            box-shadow: 0 0 30px rgba(255,159,195,0.4);
            animation: blobFloat 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .buttons a {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            transition: .3s;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-content { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1rem; }
        .btn-sub { font-size: 0.7rem; opacity: 0.7; margin-left: 28px; font-weight: 400; }

        .buttons a:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.25);
            box-shadow: 0 10px 20px rgba(255,159,195,0.2);
        }

        .stream-btn { border: 1px solid #ff9fc3 !important; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 159, 195, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0); }
        }

        footer { position: absolute; bottom: 15px; opacity: .6; font-size: .8rem; }

        /* Эффект сакуры */
        .sakura {
            position: fixed;
            top: -10%;
            color: #ffb7d5;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar-blob">🌸</div>
        <h1>Yapponecc</h1>
        <p class="tagline">Welcome to my world ✨</p>

        <div class="buttons">
            <a href="#" class="stream-btn">
                <div class="btn-content"><i class="fa-solid fa-play"></i> Live Stream</div>
                <div class="btn-sub">Присоединяйся сейчас!</div>
            </a>
            <a href="#">
                <div class="btn-content"><i class="fa-brands fa-telegram"></i> Telegram</div>
                <div class="btn-sub">Мои мысли и новости</div>
            </a>
            <a href="#">
                <div class="btn-content"><i class="fa-brands fa-instagram"></i> Instagram</div>
                <div class="btn-sub">Фото из жизни</div>
            </a>
        </div>
    </div>

    <footer>Created with 💗 by Yapponecc</footer>

    <script>
        // Функция для создания падающей сакуры
        function createSakura() {
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            leaf.innerHTML = '🌸';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.fontSize = Math.random() * 10 + 10 + 'px';
            leaf.style.duration = Math.random() * 3 + 2 + 's';
            leaf.style.opacity = Math.random();
            
            document.body.appendChild(leaf);
            
            leaf.animate([
                { transform: `translateY(-10vh) rotate(0deg)` },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)` }
            ], {
                duration: Math.random() * 3000 + 5000,
                easing: 'linear'
            });

            setTimeout(() => { leaf.remove(); }, 8000);
        }

        setInterval(createSakura, 300);
    </script>
</body>
</html>
