<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapponecc</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  background: url('https://www.wallpaperuse.com/wallp/24-244917_m.png') no-repeat center center fixed;
  background-size: cover;
  overflow:hidden;
}
h1{font-size:2.8rem;margin-bottom:10px;text-shadow: 0 0 10px #ff3b6b, 0 0 20px #ff8fa3;}
p{opacity:.9;margin-bottom:25px;text-shadow: 0 0 10px #ff3b6b, 0 0 20px #ff8fa3;}

.buttons{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:250px;
}
.buttons a{
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.2);
  padding:14px;
  border-radius:16px;
  font-weight:600;
  transition:.3s;
  backdrop-filter:blur(10px);
  text-shadow:0 0 8px #ff3b6b;
}
.buttons a:hover{
  transform:scale(1.08);
  background:rgba(255,255,255,0.35);
  box-shadow:0 0 20px rgba(255,59,107,0.7),0 0 40px rgba(255,143,163,0.7);
}

.stream{
  background:linear-gradient(45deg,#ff004c,#ff5e7e)!important;
}

footer{
  position:absolute;
  bottom:15px;
  opacity:.7;
  font-size:.9rem;
}

/* аватар */
.avatar-static{
  width:150px;
  height:150px;
  margin-bottom:20px;
  border-radius:20px;
  box-shadow:0 0 20px #ff6b8a,0 0 40px #ff3b6b,0 0 60px #ff8fa3;
  animation:avatarFloat 3s ease-in-out infinite;
}
@keyframes avatarFloat{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

/* сердечки курсора */
.heart{
  position:fixed;
  font-size:18px;
  pointer-events:none;
  animation:heart 1s linear forwards;
}
@keyframes heart{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-60px) scale(0);opacity:0;}
}

/* сакура */
.sakura{
  position:absolute;
  top:-20px;
  font-size:20px;
  animation:sakuraFall linear infinite;
}
@keyframes sakuraFall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* мобильная адаптация */
@media(max-width:500px){
  .buttons{width:200px;}
  .avatar-static{width:120px;height:120px;}
  h1{font-size:2.2rem;}
}
</style>
</head>

<body>

<!-- статичный аватар (можно заменить на любое изображение) -->
<div class="avatar-static">
  <img src="https://mc-heads.net/avatar/Steve/200" alt="avatar" style="width:100%;height:100%;border-radius:15px;">
</div>

<h1>Yapponecc 💗</h1>
<p>Добро пожаловать на мою страницу</p>

<div class="buttons">
<a href="https://t.me/yapponecc1">Telegram</a>
<a href="https://discord.com/users/yapponecc">Discord</a>
<a href="mailto:iropot6@gmail.com">Email</a>
<a class="stream" href="#">🎮 Смотреть стрим</a>
</div>

<footer>© 2026 Yapponecc</footer>

<script>
// сердечки курсора
document.addEventListener("mousemove",function(e){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=e.clientX+"px";
  heart.style.top=e.clientY+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),1000);
});

// сакура
function createSakura(){
  let sakura=document.createElement("div");
  sakura.className="sakura";
  sakura.innerHTML="🌸";
  sakura.style.left=Math.random()*100+"vw";
  sakura.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(sakura);
  setTimeout(()=>sakura.remove(),10000);
}
setInterval(createSakura,600);
</script>

</body>
</html>
