<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapponecc 💗</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  /* Анимированный градиент на фоне */
  background: linear-gradient(-45deg, #ff9fc3, #a0d4ff, #ffc4d6, #c2e5ff);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  overflow:hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Стеклянная карточка с 3D эффектом */
.glass-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 40px;
  padding: 40px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  z-index: 10;
  transform-style: preserve-3d;
  perspective: 1000px;
  transition: transform 0.1s ease-out;
}

h1{font-size:2.5rem;margin-bottom:5px;text-shadow: 0 0 15px rgba(255,159,195,0.5);}
.tagline{opacity:.8;margin-bottom:25px;font-size: 0.9rem;}

/* Аватар-блоб */
.avatar-blob{
  width:130px;
  height:130px;
  margin: 0 auto 20px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #ff9fc3, #a0d4ff);
  box-shadow:0 0 30px rgba(255,159,195,0.4);
  animation:blobFloat 3s ease-in-out infinite;
}

@keyframes blobFloat{
  0%, 100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}

/* Кнопки */
.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
}

.buttons a{
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.1);
  padding:12px 20px;
  border-radius:20px;
  backdrop-filter:blur(5px);
  transition:.3s;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}

.btn-content {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  font-size: 1rem;
}

.btn-sub {
  font-size: 0.7rem;
  opacity: 0.7;
  margin-left: 28px;
  font-weight: 400;
}

.buttons a:hover{
  transform: scale(1.05) translateZ(30px);
  background:rgba(255,255,255,0.25);
  box-shadow:0 10px 20px rgba(255,159,195,0.2);
}

/* Спец-стиль для стрима */
.stream-btn {
  border: 1px solid #ff9fc3 !important;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(255, 159, 195, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0); }
}

/* Музыкальная кнопка */
.music-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 45px;
  height: 45px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
  border: 1px solid rgba(255,255,255,0.3);
}

.playing i { animation: spin 3s linear infinite; color: #ff9fc3; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

footer{position:absolute;bottom:15px;opacity:.6;font-size:.8rem;}

/* Частицы (Сакура и Сердца) */
.heart{position:fixed;font-size:16px;pointer-events:none;animation:heartAni 1s linear forwards;color:#ff9fc3;}
@keyframes heartAni{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-50px) scale(0);opacity:0;}}

.sakura{position:absolute;top:-20px;pointer-events:none;animation:sakuraFall linear infinite;}
@keyframes sakuraFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
</style>
</head>

<body>
