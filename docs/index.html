<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapponecc</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;

background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff8fa3,#ff4d6d);
background-size:400% 400%;
animation:gradient 12s ease infinite;

overflow:hidden;

}

@keyframes gradient{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

h1{

font-size:3rem;
margin-bottom:10px;

}

p{

opacity:.9;
margin-bottom:30px;

}

.contact-buttons{

display:flex;
flex-direction:column;
gap:15px;
width:250px;

}

.contact-buttons a{

text-decoration:none;
color:white;
background:rgba(255,255,255,0.2);

padding:14px;
border-radius:14px;

font-weight:600;

transition:.3s;

backdrop-filter:blur(10px);

}

.contact-buttons a:hover{

transform:scale(1.08);
background:rgba(255,255,255,0.35);
box-shadow:0 0 20px rgba(255,255,255,0.5);

}

footer{

position:absolute;
bottom:15px;
opacity:.7;
font-size:.9rem;

}

.hearts{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;

}

.heart{

position:absolute;
color:#ffd6e0;
font-size:24px;
animation:float 10s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}

}

</style>
</head>

<body>

<h1>Yapponecc 💗</h1>
<p>Свяжись со мной любым удобным способом</p>

<div class="contact-buttons">

<a href="https://t.me/yourusername">Telegram</a>

<a href="mailto:yourmail@example.com">Email</a>

<a href="https://discord.com/users/yourid">Discord</a>

<a href="#">TikTok</a>

</div>

<footer>© 2026 Yapponecc</footer>

<div class="hearts">

<div class="heart" style="left:10%; animation-duration:8s;">❤</div>
<div class="heart" style="left:30%; animation-duration:12s;">❤</div>
<div class="heart" style="left:50%; animation-duration:10s;">❤</div>
<div class="heart" style="left:70%; animation-duration:14s;">❤</div>
<div class="heart" style="left:90%; animation-duration:9s;">❤</div>

</div>

</body>
</html>
