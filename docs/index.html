<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc 💗 Цели</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            /* Анимированный градиент на фоне (нежный) */
            background: linear-gradient(-45deg, #ffb7d5, #c2e5ff, #ffd1df, #d0ecff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Основная стеклянная карточка */
        .glass-card {
            background: rgba(0, 0, 0, 0.3); /* Темная подложка для контраста */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            z-index: 10;
            position: relative;
        }

        /* Заголовки */
        h1 { font-size: 2.8rem; margin-bottom: 5px; color: #fff; text-shadow: 0 0 15px rgba(255,159,195,0.7); }
        .tagline { opacity: .9; margin-bottom: 15px; font-size: 0.95rem; color: #eee; }

        /* Блок Цели */
        .goal-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .goal-title { font-size: 0.85rem; font-weight: 600; color: #ff9fc3; margin-bottom: 5px; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9fc3, #ffb7d5);
            width: 0%; /* Будет обновляться */
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(255,159,195,0.7);
        }

        /* Аватар-блоб */
        .avatar-blob {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff9fc3, #a0d4ff);
            box-shadow: 0 0 30px rgba(255,159,195,0.5);
            animation: blobFloat 3s ease-in-out infinite;
            display: flex; align-items: center; justify-content: center; font-size: 3.5rem;
        }

        @keyframes blobFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* Кнопки */
        .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .buttons a {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.08); /* Очень прозрачный белый */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }

        /* КОНТРАСТ ПРИ НАВЕДЕНИИ: Плавная заливка розовым */
        .buttons a:hover {
            transform: scale(1.03) translateY(-3px);
            background: #ff9fc3; /* Насыщенный розовый фон для контраста */
            border-color: #ff9fc3;
            box-shadow: 0 10px 20px rgba(255,159,195,0.4);
        }

        /* Элементы внутри кнопки */
        .btn-content { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.05rem; }
        .btn-sub { font-size: 0.75rem; opacity: 0.8; margin-left: 31px; font-weight: 400; color: #f0f0f0; }

        /* Текст внутри кнопки при наведении тоже немного меняется для четкости */
        .buttons a:hover .btn-sub { color: #fff; opacity: 1; }

        /* Спец-стиль для стрима (постоянно пульсирует) */
        .stream-btn {
            border: 1px solid #ff9fc3 !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(255, 159, 195, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 159, 195, 0); }
        }

        /* Фоновые лепестки сакуры */
        .sakura {
            position: fixed; top: -10%; color: #ffb7d5; user-select: none; pointer-events: none; z-index: 1;
        }

        footer { position: absolute; bottom: 15px; opacity: .7; font-size: .85rem; color: #eee; z-index: 5; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="avatar-blob">🌸</div>
        <h1>Yapponecc</h1>
        <p class="tagline">Welcome to my world ✨</p>

        <div class="goal-container">
            <div class="goal-title">Цель: 5000 подписчиков</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:45%"></div>
            </div>
        </div>

        <div class="buttons">
            <a href="https://www.tiktok.com/@yapponec?_r=1&_t=ZS-94FQa3ilFvM" class="stream-btn" target="_blank">
                <div class="btn-content"><i class="fa-solid fa-play"></i> Live Stream</div>
                <div class="btn-sub">Присоединяйся сейчас!</div>
            </a>

            <a href="https://t.me/+06kgQmNA1ypjOGFi">
                <div class="btn-content"><i class="fa-brands fa-telegram"></i> Telegram Канал</div>
                <div class="btn-sub">Мои мысли, новости и анонсы</div>
            </a>

            <a href="https://t.me/yappopec" target="_blank">
                <div class="btn-content"><i class="fa-solid fa-paper-plane"></i> Личный Telegram</div>
                <div class="btn-sub">Связаться со мной напрямую</div>
            </a>

            <a href="https://discord.com/users/yapponecc" target="_blank">
                <div class="btn-content"><i class="fa-brands fa-discord"></i> Личный Discord</div>
                <div class="btn-sub">Для общения и игр</div>
            </a>
        </div>
    </div>

    <footer>Created with 💗 by Yapponecc</footer>

    <script>
        // Функция для создания падающей сакуры
        function createSakura() {
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            leaf.innerHTML = '🌸';
            leaf.style.left = Math.random() * 100 + 'vw';
            
            document.body.appendChild(leaf);
            
            const animation = leaf.animate([
                { transform: `translateY(-10vh) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 4000 + 6000,
                easing: 'linear'
            });

            animation.onfinish = () => { leaf.remove(); };
        }

        // Создаем лепестки каждые 400мс
        setInterval(createSakura, 400);
    </script>
</body>
</html>
