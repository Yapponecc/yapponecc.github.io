<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc | Private Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            padding: 20px;
            overflow-x: hidden;
        }

        /* Анимированный фон (энергетические линии) */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
            text-align: center;
        }

        /* Центральный реактор */
        .reactor {
            width: 90px; height: 90px;
            margin: 0 auto 20px;
            background: #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 30px #00f2ff, inset 0 0 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            animation: pulseReactor 2s infinite;
        }
        .reactor::after {
            content: '';
            width: 70%; height: 70%;
            border: 4px dashed #0a0a12;
            border-radius: 50%;
            animation: rotateReactor 5s linear infinite;
        }

        @keyframes pulseReactor {
            0% { transform: scale(1); box-shadow: 0 0 20px #00f2ff; }
            50% { transform: scale(1.05); box-shadow: 0 0 40px #00f2ff; }
            100% { transform: scale(1); box-shadow: 0 0 20px #00f2ff; }
        }
        @keyframes rotateReactor { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.1rem; color: #00f2ff; margin-bottom: 25px; }

        .buttons { display: flex; flex-direction: column; gap: 12px; }

        /* Стили для Каспи и Доната */
        .mc-btn {
            font-family: 'Press Start 2P', cursive;
            text-decoration: none;
            color: white;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid;
            transition: 0.2s;
            position: relative;
        }

        .da-btn { background: #d30000; border-color: #5d0000; box-shadow: 0 5px 0 #5d0000; }
        .kaspi-btn { background: #f14635; border-color: #8a1a11; box-shadow: 0 5px 0 #8a1a11; }

        .mc-btn:hover { transform: translateY(-3px); }
        .mc-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #5d0000; }

        .btn-top { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; margin-bottom: 5px; }
        .kaspi-number { font-size: 1rem; letter-spacing: 1px; color: #fff; text-shadow: 2px 2px 0 #000; }

        /* Соцсети и Контакты */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        .small-btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .small-btn i { font-size: 1.2rem; }
        .small-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: #00f2ff; }

        /* Иконка Каспи (SVG) */
        .kaspi-svg { width: 24px; height: 24px; fill: white; }

        .footer-text { margin-top: 25px; font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="glass-card">
        <div class="reactor"></div>
        <h1>SYSTEM: YAPPONECC</h1>

        <div class="buttons">
            <a href="https://www.donationalerts.com/r/yapponecc" class="mc-btn da-btn" target="_blank">
                <div class="btn-top">
                    <img src="https://www.donationalerts.com/favicon.ico" style="width:20px" alt="">
                    DONATE ALERTS
                </div>
                <div style="font-family: 'Poppins'; font-size: 0.7rem; opacity: 0.9;">ПОДДЕРЖАТЬ СТРИМ</div>
            </a>

            <a href="https://kaspi.kz/pay/_/Transfer/Transfer?number=87079412858" class="mc-btn kaspi-btn" target="_blank">
                <div class="btn-top">
                    <svg class="kaspi-svg" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-2 17.5l-5.5-5.5 1.414-1.414 4.086 4.086 9.086-9.086 1.414 1.414-10.5 10.5z"/></svg>
                    KASPI GOLD
                </div>
                <div class="kaspi-number">8707 941 2858</div>
            </a>

            <div class="contact-grid">
                <a href="https://t.me/yappopec" class="small-btn" target="_blank">
                    <i class="fa-solid fa-user-shield" style="color: #00f2ff;"></i>
                    <span>Личный TG</span>
                </a>
                <a href="https://discord.com/users/yapponecc" class="small-btn" target="_blank">
                    <i class="fa-brands fa-discord" style="color: #5865F2;"></i>
                    <span>Личный DS</span>
                </a>
                <a href="https://t.me/+06kgQmNA1ypjOGFi" class="small-btn" target="_blank">
                    <i class="fa-brands fa-telegram"></i>
                    <span>TG Канал</span>
                </a>
                <a href="https://www.tiktok.com/@yapponec" class="small-btn" target="_blank">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
            </div>
        </div>

        <div class="footer-text">CORE STATUS: ACTIVE</div>
    </div>

    <script>
        // Эффект искр Jarvis
        function createSpark() {
            const spark = document.createElement('div');
            spark.style.position = 'fixed';
            spark.style.width = '2px';
            spark.style.height = '2px';
            spark.style.background = '#00f2ff';
            spark.style.left = Math.random() * 100 + 'vw';
            spark.style.top = '-10px';
            spark.style.zIndex = '0';
            document.body.appendChild(spark);

            spark.animate([
                { transform: 'translateY(0)', opacity: 1 },
                { transform: `translateY(110vh) translateX(${Math.random() * 100 - 50}px)`, opacity: 0 }
            ], { duration: 3000 + Math.random() * 2000, easing: 'linear' }).onfinish = () => spark.remove();
        }
        setInterval(createSpark, 150);
    </script>
</body>
</html>
