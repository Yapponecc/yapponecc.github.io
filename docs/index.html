<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapponecc | CORE HUB v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            padding: 20px;
            overflow-x: hidden;
            perspective: 1000px; /* Для 3D эффекта фона */
        }

        /* --- ДИНАМИЧНЫЙ ФОН (Jarvis Grid) --- */
        .bg-grid-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            transform-style: preserve-3d;
        }
        .bg-grid {
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute; top: -50%; left: -50%;
            transition: transform 0.1s linear; /* Плавность для JS */
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 242, 255, 0.25);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.25);
            text-align: center;
            z-index: 1; /* Чтобы быть над фоном */
        }

        .reactor {
            width: 65px; height: 65px;
            margin: 0 auto 15px;
            background: #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 30px #00f2ff;
            animation: pulseReactor 2s infinite;
        }

        /* --- ЦЕЛЬ И РАСПИСАНИЕ ( Minecraft Style ) --- */
        .goal-section { margin-bottom: 20px; padding: 0 10px; }
        .minecraft-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #00f2ff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .progress-container {
            width: 100%; height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #00f2ff, #70a1ff);
            box-shadow: 0 0 20px #00f2ff;
            border-radius: 20px;
            transition: width 2s cubic-bezier(0.1, 0.5, 0.1, 1);
        }

        /* --- НОВАЯ СЕКЦИЯ РАСПИСАНИЯ --- */
        .streams-schedule {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            line-height: 1.5;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 1rem; color: #fff; margin-bottom: 25px; }

        /* --- НОВАЯ СЕКЦИЯ ГАЛЕРЕИ (Карусель) --- */
        .art-gallery-section {
            margin-bottom: 25px;
            padding: 0 10px;
            position: relative;
        }
        .gallery-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .swiper-container {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }
        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Чтобы арты не растягивались */
        }

        /* --- КНОПКИ (Не трогал) --- */
        .buttons { display: flex; flex-direction: column; gap: 14px; }
        .mc-btn {
            font-family: 'Press Start 2P', cursive;
            text-decoration: none;
            color: white;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px solid;
            border-radius: 25px; 
            transition: 0.3s;
        }
        .mc-btn:active { transform: translateY(4px); }
        .text-stripe {
            background: rgba(0,0,0,0.85);
            width: 100%;
            padding: 8px 0;
            margin-top: 8px;
            border-radius: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .da-btn { background: linear-gradient(135deg, #ff9900 0%, #ff6600 100%); border-color: #cc5200; box-shadow: 0 6px 0 #993d00; }
        .da-btn .btn-desc { font-family: 'Poppins'; font-size: 0.75rem; font-weight: 600; }
        .kaspi-btn { background: #f14635; border-color: #8a1a11; box-shadow: 0 6px 0 #8a1a11; }
        .kaspi-number { font-size: 1.1rem; letter-spacing: 1px; color: #fff; }
        .tg-main-btn {
            background: linear-gradient(135deg, #0088cc 0%, #00f2ff 100%);
            border-color: #005a87;
            box-shadow: 0 6px 0 #003a57, 0 0 20px rgba(0, 242, 255, 0.4);
            animation: highlightBtn 3s infinite;
        }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .small-btn {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 20px;
            font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .small-btn:hover { border-color: #00f2ff; background: rgba(0, 242, 255, 0.1); }
        .footer-text { margin-top: 35px; font-size: 0.55rem; opacity: 0.3; letter-spacing: 2px; }

        /* АНИМАЦИИ (Не трогал) */
        @keyframes highlightBtn {
            0%, 100% { transform: scale(1); box-shadow: 0 6px 0 #003a57, 0 0 20px rgba(0, 242, 255, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 6px 0 #003a57, 0 0 35px rgba(0, 242, 255, 0.7); }
        }
        @keyframes pulseReactor { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.css"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        // Анимация бара при загрузке (Не трогал)
        window.onload = () => {
            const targetPercent = 74; 
            const bar = document.getElementById('progress-line');
            const text = document.getElementById('percent-text');
            bar.style.width = targetPercent + '%';
            let current = 0;
            const interval = setInterval(() => {
                if (current >= targetPercent) { clearInterval(interval); } 
                else { current++; text.innerText = current + '%'; }
            }, 25);
        };

        // Инициализация карусели (Swiper)
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            grabCursor: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
        });

        // ДИНАМИЧНЫЙ ФОН (Jarvis Effect)
        const bgGrid = document.getElementById('bgGrid');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth - 0.5; // от -0.5 до 0.5
            const y = e.clientY / window.innerHeight - 0.5;
            // Смещение сетки (чем больше число, тем сильнее эффект)
            bgGrid.style.transform = `translate(${x * 50}px, ${y * 50}px)`;
        });

        // Для телефонов (акселерометр - опционально, но лучше через touch)
        // Простой эффект для телефонов при скролле тоже работает.
    </script>
